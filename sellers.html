<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Seller Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: auto;
    }
    h1, h2 {
      text-align: center;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sell Your Gadget</h1>

    <div class="card">
      <input type="text" id="name" placeholder="Gadget Name" />
      <input type="number" id="price" placeholder="Price" />

      <select id="condition">
        <option value="">Select Condition</option>
        <option>New</option>
        <option>Used - Like New</option>
        <option>Used - Good</option>
        <option>Used - Fair</option>
      </select>

      <input type="file" id="image" accept="image/*" />

      <button onclick="addItem()">Add Listing</button>
    </div>

    <h2>Your Listings</h2>
    <div class="grid" id="listings"></div>
  </div>

  <script>
    function addItem() {
      const name = document.getElementById('name').value;
      const price = document.getElementById('price').value;
      const condition = document.getElementById('condition').value;
      const imageInput = document.getElementById('image');

      if (!name || !price || !condition || !imageInput.files[0]) {
        alert('Please fill all fields');
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        const listings = document.getElementById('listings');

        const item = document.createElement('div');
        item.className = 'card item';

        item.innerHTML = `
          <img src="${e.target.result}" alt="${name}" />
          <h3>${name}</h3>
          <p><strong>Price:</strong> $${price}</p>
          <p><strong>Condition:</strong> ${condition}</p>
        `;

        listings.appendChild(item);
      };

      reader.readAsDataURL(imageInput.files[0]);

      // Reset form
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('condition').value = '';
      document.getElementById('image').value = '';
    }
  </script>
</body>
</html>

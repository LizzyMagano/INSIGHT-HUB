<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Gadget</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    .container { max-width:900px; margin:auto; }
    .card { background:white; padding:15px; border-radius:10px; }
    input, select { width:100%; padding:10px; margin:8px 0; }
    button { width:100%; padding:10px; background:#007bff; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html">← Back Home</a>
  <h1>Sell Your Gadget</h1>

  <div class="card">
    <input type="text" id="name" placeholder="Gadget Name">
    <input type="number" id="price" placeholder="Price">

    <select id="condition">
      <option value="">Select Condition</option>
      <option>New</option>
      <option>Used - Like New</option>
      <option>Used - Good</option>
      <option>Used - Fair</option>
    </select>

    <input type="file" id="image" accept="image/*">

    <button onclick="addItem()">Add Listing</button>
  </div>
</div>

<script>
function addItem() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const condition = document.getElementById('condition').value;
  const file = document.getElementById('image').files[0];

  if (!name || !price || !condition || !file) {
    alert('Please fill all fields');
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const item = {
      name,
      price,
      condition,
      image: e.target.result
    };

    // Save to shared storage
    let items = JSON.parse(localStorage.getItem('laptops')) || [];
    items.push(item);
    localStorage.setItem('laptops', JSON.stringify(items));

    // 🔥 Redirect to laptops page
    window.location.href = "laptops.html";
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>

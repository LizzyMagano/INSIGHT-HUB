<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Hive Home</title>

<style>
body { 
  font-family: Arial, sans-serif; 
  margin: 0; 
  padding: 0; 
  color: white;
}

/* Background Image Section */
.hero {
  height: 100vh;
  background:  linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('background.jpg'); 
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Content Styling */
h1 {
  font-size: 2.8rem; 
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

p {
  font-size: 1.2rem;
  margin: 10px 0 20px 0;
}

.container {
  max-width: 500px;
  padding: 20px;
}

a.button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 220px;
  text-decoration: none;
  color: white;
  background: #b30000;
  font-weight: bold;
  border-radius: 10px;
  transition: 0.3s;
}

a.button:hover {
  background: white;
  color: #b30000;
  border: 2px solid #b30000;
  transform: scale(1.05);
}

#notify {
  margin-top: 15px;
  font-weight: bold;
}

button.logout {
  background: #b30000;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
}

button.logout:hover {
  background: white;
  color: #b30000;
  border: 2px solid #b30000;
}
</style>
</head>

<body>

<div class="hero">
  <div class="container">
    <h1>Insight Hive Laptops</h1>
    <p>Student-Friendly Laptop Hire Purchase</p>
    <p><strong>All laptops are pre-owned and refurbished ✔️</strong></p>

    <a href="laptops.html" class="button">View Laptops</a>
    <a href="cart.html" class="button">Cart</a>
    <a href="form.html" class="button">Purchase now</a>
    <a href="contact.html" class="button">Contact Us</a>

    <p id="notify"></p>
    <button class="logout" onclick="logout()">Logout 🔒</button>
  </div>
</div>

<script>
function checkUpdate() {
  let lastSeen = localStorage.getItem("lastSeenUpdate");
  let currentUpdate = "v1.0";
  if(lastSeen !== currentUpdate){
    document.getElementById("notify").innerText = "✨ New laptops just added!";
    localStorage.setItem("lastSeenUpdate", currentUpdate);
  }
}
checkUpdate();

function logout() {
  localStorage.removeItem("cart");
  localStorage.removeItem("selectedLaptop");
  window.location.href = "index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop · Insight Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background: #e9ecef;
      width: 100%;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      border-radius: 1.25rem;
    }
    .modal-header {
      background: #1e293b;
      color: white;
      border-radius: 1.25rem 1.25rem 0 0;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .btn-primary {
      background: #b30000;
      border: none;
    }
    .btn-primary:hover {
      background: #8f0000;
    }
    .btn-success {
      background: #16a34a;
      border: none;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .card {
      height: 100%;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .badge-condition {
      background: #e9ecef;
      color: #1a1a2e;
      font-weight: 500;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 60px;
    }
    .seller-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: #b30000;
      color: white;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 60px;
      opacity: 0.8;
    }
    .sold-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.3rem;
      z-index: 20;
      letter-spacing: 2px;
    }
    .sold-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 15;
      border-radius: 8px;
    }
    .laptop-card {
      position: relative;
    }
    .navbar-brand i {
      color: #b30000;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-laptop me-2"></i>Insight Hub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="laptops.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="sellers.html">Marketplace</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">
          <i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </nav>

  <!-- SHOP GRID -->
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3><i class="fas fa-laptop me-2"></i>Browse Laptops</h3>
      <a href="sellers.html" class="btn btn-primary btn-sm"><i class="fas fa-plus-circle me-1"></i>Sell Yours</a>
    </div>
    <p class="text-muted small mb-3"><i class="fas fa-check-circle text-success me-1"></i> All laptops are pre-owned, refurbished, and fully tested ✔️</p>
    <div id="shop" class="row"></div>
  </div>

  <!-- BUY MODAL -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-bag me-2"></i>Place Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="fw-bold mb-3 p-3 bg-light rounded">
            <i class="fas fa-tag me-2"></i> Product: <span id="productNameDisplay"></span> — P<span id="productPriceDisplay"></span>
          </div>
          <form id="buyNowForm" onsubmit="return false;">
            <div class="mb-3">
              <label for="customerName" class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <hr>
            <div class="mb-3">
              <label for="buyCondition" class="form-label fw-semibold">Condition</label>
              <input type="text" id="buyCondition" class="form-control" disabled>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label fw-semibold">Service Method <span class="text-danger">*</span></label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express Delivery</option>
              </select>
            </div>
            <input type="hidden" id="buyProductIndex" value="" />
            <input type="hidden" id="buyProductId" value="" />
            <input type="hidden" id="buySellerId" value="" />
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-primary" onclick="confirmBuy()">
            <i class="fas fa-check-circle me-1"></i> Place Order
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white border-0" role="alert" style="background: #1e293b;">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"><i class="fas fa-check-circle text-success me-2"></i> Order placed!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION
    // ============================================================
    var SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    var SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    var ORDERS_TABLE = 'shop_orders';
    var LAPTOPS_TABLE = 'laptops';
    var SELLERS_TABLE = 'sellers';

    // ============================================================
    //  📦  LAPTOP DATA
    // ============================================================
    var existingLaptops = [
      { id: null, name: "Dell Inspiron 15", price: 4200, condition: "Pre-owned, Refurbished", image: "dell.jpg", isSeller: false, status: 'available' },
      { id: null, name: "HP Pavilion 14", price: 6000, condition: "Pre-owned, Refurbished", image: "hp.jpg", isSeller: false, status: 'available' },
      { id: null, name: "Lenovo ThinkPad E14", price: 5500, condition: "Pre-owned, Refurbished", image: "lenovo.jpg", isSeller: false, status: 'available' },
      { id: null, name: "MacBook Air", price: 8000, condition: "Pre-owned, Refurbished", image: "macbook.jpg", isSeller: false, status: 'available' },
      { id: null, name: "Acer Aspire", price: 3500, condition: "Pre-owned, Refurbished", image: "acer.jpg", isSeller: false, status: 'available' }
    ];

    var sellerLaptops = [];
    var allLaptops = [];
    var cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      document.getElementById('cartCount').textContent = cart.length;
    }

    function showToast(msg, isError) {
      var toastEl = document.getElementById('orderToast');
      var toastBody = document.getElementById('toastMessage');
      toastBody.innerHTML = msg;
      toastEl.style.background = isError ? '#dc3545' : '#1e293b';
      var toast = new bootstrap.Toast(toastEl, { delay: 3500 });
      toast.show();
    }

    // ============================================================
    //  📥  FETCH SELLER LAPTOPS FROM SUPABASE
    // ============================================================
    function fetchSellerLaptops(callback) {
      var url = SUPABASE_URL + '/rest/v1/' + LAPTOPS_TABLE;

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            sellerLaptops = data.map(function(item) {
              return {
                id: item.id,
                name: item.name,
                price: item.price,
                condition: item.condition,
                image: item.image || 'https://via.placeholder.com/300x220?text=No+Image',
                isSeller: true,
                status: item.status || 'available',
                seller_id: item.seller_id || null,
                commission_rate: item.commission_rate || 20
              };
            });
          } catch (e) { sellerLaptops = []; }
          callback();
        } else {
          sellerLaptops = [];
          callback();
        }
      };
      xhr.send();
    }

    // ============================================================
    //  🔍  GET SELLER DETAILS
    // ============================================================
    function getSellerDetails(sellerId, callback) {
      var url = SUPABASE_URL + '/rest/v1/' + SELLERS_TABLE + '?id=eq.' + sellerId;

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            if (data && data.length > 0) {
              callback({ success: true, seller: data[0] });
            } else {
              callback({ success: false });
            }
          } catch (e) {
            callback({ success: false });
          }
        } else {
          callback({ success: false });
        }
      };
      xhr.send();
    }

    // ============================================================
    //  📤  SAVE ORDER TO SUPABASE
    // ============================================================
    function saveOrderToSupabase(orderData, callback) {
      var url = SUPABASE_URL + '/rest/v1/' + ORDERS_TABLE;
      var xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Prefer', 'return=representation');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && (xhr.status === 200 || xhr.status === 201)) {
          try {
            var data = JSON.parse(xhr.responseText);
            callback({ success: true, data: data });
          } catch (e) {
            callback({ success: true, data: [orderData] });
          }
        } else {
          callback({ success: false, error: xhr.status + ': ' + xhr.responseText });
        }
      };
      xhr.send(JSON.stringify(orderData));
    }

    // ============================================================
    //  🔄  UPDATE LAPTOP STATUS TO SOLD
    // ============================================================
    function updateLaptopStatus(laptopId, buyerEmail, callback) {
      var url = SUPABASE_URL + '/rest/v1/' + LAPTOPS_TABLE + '?id=eq.' + laptopId;
      var data = {
        status: 'sold',
        sold_at: new Date().toISOString(),
        buyer_email: buyerEmail
      };

      var xhr = new XMLHttpRequest();
      xhr.open('PATCH', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          callback({ success: true });
        } else {
          callback({ success: false });
        }
      };
      xhr.send(JSON.stringify(data));
    }

    // ============================================================
    //  🛍️  CONFIRM BUY
    // ============================================================
    function confirmBuy() {
      var index = document.getElementById('buyProductIndex').value;
      var laptop = allLaptops[index];
      if (!laptop) { showToast('❌ Product not found.', true); return; }

      if (laptop.status === 'sold') {
        showToast('❌ This laptop has already been sold.', true);
        return;
      }

      var customerName = document.getElementById('customerName').value.trim();
      var customerEmail = document.getElementById('customerEmail').value.trim();
      var customerPhone = document.getElementById('customerPhone').value.trim();
      var service = document.getElementById('buyService').value;

      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.', true);
        return;
      }
      if (!service) {
        showToast('⚠️ Please select a service method.', true);
        return;
      }

      var confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Placing order...';

      // Build order with seller info if it's a seller laptop
      var orderPayload = {
        customer_name: customerName,
        customer_email: customerEmail,
        customer_phone: customerPhone,
        product_name: laptop.name,
        price: laptop.price,
        color: 'N/A',
        size: 'N/A',
        service_method: service,
        status: 'pending',
        ordered_at: new Date().toISOString()
      };

      // If seller laptop, add commission tracking
      if (laptop.isSeller && laptop.seller_id) {
        getSellerDetails(laptop.seller_id, function(sellerResult) {
          if (sellerResult.success) {
            var seller = sellerResult.seller;
            var commissionRate = seller.commission_rate || 20;
            var commissionAmount = (laptop.price * commissionRate) / 100;
            var sellerPayout = laptop.price - commissionAmount;

            orderPayload.seller_id = laptop.seller_id;
            orderPayload.seller_name = seller.seller_name;
            orderPayload.seller_email = seller.seller_email;
            orderPayload.commission_rate = commissionRate;
            orderPayload.commission_amount = commissionAmount;
            orderPayload.seller_payout = sellerPayout;
            orderPayload.payout_status = 'pending';

            // Save order
            saveOrder(orderPayload, laptop);
          } else {
            // Save without seller info
            saveOrder(orderPayload, laptop);
          }
        });
      } else {
        // Not a seller laptop - save normally
        saveOrder(orderPayload, laptop);
      }
    }

    function saveOrder(orderPayload, laptop) {
      saveOrderToSupabase(orderPayload, function(result) {
        if (!result.success) {
          showToast('❌ Failed to place order.', true);
          document.getElementById('confirmBuyBtn').disabled = false;
          document.getElementById('confirmBuyBtn').innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
          return;
        }

        // If seller laptop, update status to sold
        if (laptop.isSeller && laptop.id) {
          updateLaptopStatus(laptop.id, orderPayload.customer_email, function(updateResult) {
            if (updateResult.success) {
              console.log('✅ Laptop marked as sold');
            }
            // Refresh the page to show sold status
            setTimeout(function() {
              location.reload();
            }, 1500);
          });
        } else {
          // For non-seller laptops, just show success
          showToast('✅ Order placed for "' + laptop.name + '"! Check your email.');
          var modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
          if (modal) modal.hide();
          document.getElementById('buyNowForm').reset();
          document.getElementById('confirmBuyBtn').disabled = false;
          document.getElementById('confirmBuyBtn').innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
        }
      });
    }

    // ============================================================
    //  🛠️  PREPARE BUY NOW MODAL
    // ============================================================
    function prepareBuyNow(index) {
      var laptop = allLaptops[index];
      if (!laptop) return;

      document.getElementById('productNameDisplay').textContent = laptop.name;
      document.getElementById('productPriceDisplay').textContent = laptop.price;
      document.getElementById('buyProductIndex').value = index;
      document.getElementById('buyProductId').value = laptop.id || '';
      document.getElementById('buySellerId').value = laptop.seller_id || '';
      document.getElementById('buyCondition').value = laptop.condition || 'Pre-owned, Refurbished';

      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('buyService').value = '';
    }

    function addToCart(index) {
      var laptop = allLaptops[index];
      if (!laptop || laptop.status === 'sold') return;
      var cartItem = {
        name: laptop.name,
        price: laptop.price,
        image: laptop.image,
        condition: laptop.condition,
        isSeller: laptop.isSeller || false,
        laptopId: laptop.id || null,
        sellerId: laptop.seller_id || null
      };
      cart.push(cartItem);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast('🛒 "' + laptop.name + '" added to cart!');
    }

    // ============================================================
    //  🎨  RENDER PRODUCTS
    // ============================================================
    function renderProducts() {
      var shop = document.getElementById('shop');
      shop.innerHTML = '';

      allLaptops = existingLaptops.concat(sellerLaptops);

      for (var i = 0; i < allLaptops.length; i++) {
        var laptop = allLaptops[i];
        var isSeller = laptop.isSeller || false;
        var isSold = laptop.status === 'sold';

        var card = document.createElement('div');
        card.className = 'col-md-4 col-lg-3 mb-4 laptop-card';
        card.innerHTML = `
          <div class="card shadow-sm h-100" style="position: relative;">
            ${isSold ? '<div class="sold-overlay"></div><div class="sold-badge">SOLD</div>' : ''}
            ${isSeller && !isSold ? `<button class="btn btn-danger btn-sm" style="position:absolute;top:10px;right:10px;z-index:10;border-radius:50%;width:30px;height:30px;font-size:0.7rem;padding:0;" onclick="deleteLaptop(${i})"><i class="fas fa-times"></i></button>` : ''}
            <img src="${laptop.image || 'https://via.placeholder.com/300x220?text=No+Image'}" class="card-img-top" alt="${laptop.name}" 
                 onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${laptop.name}</h5>
              <p class="card-text fw-bold text-danger">P${laptop.price.toFixed(2)}</p>
              <p class="card-text small text-muted"><span class="badge-condition">${laptop.condition || 'Pre-owned, Refurbished'}</span></p>
              ${isSeller ? '<span class="seller-badge">➕ Seller Added</span>' : ''}
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary btn-sm" onclick="addToCart(${i})" ${isSold ? 'disabled' : ''}>
                  <i class="fas fa-cart-plus me-1"></i>${isSold ? 'Sold Out' : 'Add to Cart'}
                </button>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#buyNowModal" 
                        onclick="prepareBuyNow(${i})" ${isSold ? 'disabled' : ''}>
                  <i class="fas fa-bolt me-1"></i>${isSold ? 'Unavailable' : 'Buy Now'}
                </button>
              </div>
            </div>
          </div>
        `;
        shop.appendChild(card);
      }

      document.getElementById('productCount').textContent = allLaptops.length;
    }

    // ============================================================
    //  🗑️  DELETE LAPTOP (Admin)
    // ============================================================
    function deleteLaptop(index) {
      var laptop = allLaptops[index];
      if (!laptop || !laptop.isSeller) return;

      if (!confirm('Are you sure you want to delete this laptop?')) return;

      var url = SUPABASE_URL + '/rest/v1/' + LAPTOPS_TABLE + '?id=eq.' + laptop.id;
      var xhr = new XMLHttpRequest();
      xhr.open('DELETE', url, true);
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 204) {
          showToast('🗑️ Laptop deleted successfully!');
          fetchSellerLaptops(renderProducts);
        }
      };
      xhr.send();
    }

    // ============================================================
    //  🚀  INIT
    // ============================================================
    function init() {
      fetchSellerLaptops(function() {
        renderProducts();
        updateCartButton();
        console.log('✅ Shop loaded with ' + allLaptops.length + ' laptops');
      });
    }

    // Expose functions
    window.addToCart = addToCart;
    window.prepareBuyNow = prepareBuyNow;
    window.confirmBuy = confirmBuy;
    window.deleteLaptop = deleteLaptop;
    window.showToast = showToast;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>

</html>

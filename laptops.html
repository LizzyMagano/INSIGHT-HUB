<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop · TechLap Store</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      background: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    .card-img-top {
      height: 220px;
      object-fit: cover;
      background: #e9ecef;
      width: 100%;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      border-radius: 1.25rem;
    }
    .modal-header {
      background: #1e293b;
      color: white;
      border-radius: 1.25rem 1.25rem 0 0;
    }
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .btn-primary {
      background: #b30000;
      border: none;
    }
    .btn-primary:hover {
      background: #8f0000;
    }
    .btn-success {
      background: #16a34a;
      border: none;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .btn-danger {
      background: #dc3545;
      border: none;
    }
    .btn-danger:hover {
      background: #bb2d3b;
    }
    .card {
      height: 100%;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card-body {
      flex: 1 1 auto;
    }
    .card-img-top {
      min-height: 220px;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #b30000;
      box-shadow: 0 0 0 0.2rem rgba(179, 0, 0, 0.25);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .navbar-brand i {
      color: #b30000;
    }
    .badge-condition {
      background: #e9ecef;
      color: #1a1a2e;
      font-weight: 500;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 60px;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 0.7rem;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .laptop-card:hover .delete-btn {
      display: flex;
    }
    .delete-btn:hover {
      background: #bb2d3b;
    }
    .seller-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: #b30000;
      color: white;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 60px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="fas fa-laptop me-2"></i>TechLap Store
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
        <button id="toggleCart" class="btn btn-success ms-3" onclick="window.location.href='cart.html'">
          <i class="fas fa-shopping-cart me-1"></i> Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </nav>

  <!-- SHOP GRID -->
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3><i class="fas fa-laptop me-2"></i>Browse Laptops</h3>
      <span class="badge bg-secondary"><i class="fas fa-box me-1"></i> <span id="productCount">0</span> laptops</span>
    </div>
    <p class="text-muted small mb-3"><i class="fas fa-check-circle text-success me-1"></i> All laptops are pre-owned, refurbished, and fully tested ✔️</p>
    <div id="shop" class="row"></div>
  </div>

  <!-- BUY NOW MODAL -->
  <div class="modal fade" id="buyNowModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-bag me-2"></i>Place Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="buyNowProductInfo" class="fw-bold mb-3 p-3 bg-light rounded">
            <i class="fas fa-tag me-2"></i> Product: <span id="productNameDisplay"></span> — P<span id="productPriceDisplay"></span>
          </div>
          <form id="buyNowForm" onsubmit="return false;">
            <div class="mb-3">
              <label for="customerName" class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="customerEmail" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="customerEmail" class="form-control" placeholder="you@example.com" required>
              <div class="form-text">We'll send order confirmation here.</div>
            </div>
            <div class="mb-3">
              <label for="customerPhone" class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
              <input type="tel" id="customerPhone" class="form-control" placeholder="+267 78 549 270" required>
            </div>
            <hr>
            <div class="mb-3">
              <label for="buyCondition" class="form-label fw-semibold">Condition</label>
              <input type="text" id="buyCondition" class="form-control" disabled>
            </div>
            <div class="mb-3">
              <label for="buyService" class="form-label fw-semibold">Service Method <span class="text-danger">*</span></label>
              <select id="buyService" class="form-select" required>
                <option value="">Choose service...</option>
                <option value="Delivery">🚚 Delivery</option>
                <option value="Pickup">🏪 Pickup</option>
                <option value="Express">⚡ Express Delivery</option>
              </select>
            </div>
            <input type="hidden" id="buyProductIndex" value="" />
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmBuyBtn" class="btn btn-primary" onclick="confirmBuy()">
            <i class="fas fa-check-circle me-1"></i> Place Order
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDER CONFIRMATION TOAST -->
  <div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white border-0" role="alert" style="background: #1e293b;">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">
          <i class="fas fa-check-circle text-success me-2"></i> Order placed successfully!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ========================================== -->
  <!-- SHOP LOGIC                                 -->
  <!-- ========================================== -->
  <script>
    // ============================================================
    //  🔧  SUPABASE CONFIGURATION
    // ============================================================
    var SUPABASE_URL = "https://wmebpsheblrkuvygguae.supabase.co";
    var SUPABASE_ANON_KEY = "sb_publishable_rUkBj0Th3x6ZXGbPkLGsHQ_f5WG3jB_";
    var ORDERS_TABLE = 'shop_orders';

    // ============================================================
    //  📦  LAPTOP DATA
    // ============================================================
    var existingLaptops = [
      { name: "Dell Inspiron 15", price: 4200, condition: "Pre-owned, Refurbished", image: "dell.jpg" },
      { name: "HP Pavilion 14", price: 6000, condition: "Pre-owned, Refurbished", image: "hp.jpg" },
      { name: "Lenovo ThinkPad E14", price: 5500, condition: "Pre-owned, Refurbished", image: "lenovo.jpg" },
      { name: "MacBook Air", price: 8000, condition: "Pre-owned, Refurbished", image: "macbook.jpg" },
      { name: "MacBook Air Alt", price: 7000, condition: "Pre-owned, Refurbished", image: "book.jpg" },
      { name: "Acer Aspire", price: 3500, condition: "Pre-owned, Refurbished", image: "acer.jpg" },
      { name: "HP Intel Core i3", price: 4500, condition: "Pre-owned, Refurbished", image: "core.jpg" },
      { name: "Dell Latitude", price: 4000, condition: "Pre-owned, Refurbished", image: "lap.jpg" },
      { name: "MacBook Pro", price: 7500, condition: "Pre-owned, Refurbished", image: "mac.jpg" },
      { name: "Lenovo Yoga", price: 5500, condition: "Pre-owned, Refurbished", image: "novo.jpg" }
    ];

    // Get seller-added laptops from localStorage
    var sellerLaptops = JSON.parse(localStorage.getItem("laptops")) || [];

    // Merge both arrays
    var allLaptops = existingLaptops.concat(sellerLaptops);

    // ============================================================
    //  🛒  CART FUNCTIONS
    // ============================================================
    var cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartButton() {
      var count = cart.length;
      document.getElementById('cartCount').textContent = count;
    }

    function showToast(msg, isError) {
      var toastEl = document.getElementById('orderToast');
      var toastBody = document.getElementById('toastMessage');
      toastBody.innerHTML = msg;
      toastEl.style.background = isError ? '#dc3545' : '#1e293b';
      var toast = new bootstrap.Toast(toastEl, { delay: 3500 });
      toast.show();
    }

    function addToCart(index) {
      var laptop = allLaptops[index];
      if (!laptop) return;

      var cartItem = {
        name: laptop.name,
        price: laptop.price,
        image: laptop.image,
        condition: laptop.condition,
        cartId: Date.now() + Math.random()
      };
      cart.push(cartItem);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartButton();
      showToast('🛒 "' + laptop.name + '" added to cart!');
    }

    // ============================================================
    //  📧  SEND ORDER NOTIFICATION VIA EMAILJS
    // ============================================================
    function sendOrderNotification(orderData) {
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
      script.onload = function() {
        emailjs.init('p1SkBpAIthT5H_oqV');

        var orderDate = new Date(orderData.ordered_at);
        var formattedDate = orderDate.toLocaleDateString('en-BW', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        var templateParams = {
          order_id: orderData.id || 'N/A',
          customer_name: orderData.customer_name,
          customer_email: orderData.customer_email,
          product_name: orderData.product_name,
          price: orderData.price.toFixed(2),
          color: orderData.color || 'N/A',
          size: orderData.size || 'N/A',
          service_method: orderData.service_method,
          ordered_at: formattedDate,
          status: orderData.status,
          store_name: "TechLap Store",
          store_address: "Plot 123, Gaborone, Botswana",
          store_phone: "+267 78549270",
          store_website: window.location.origin
        };

        emailjs.send('service_0hxmvck', 'template_us3d5rc', templateParams)
          .then(function(response) {
            console.log('✅ Order notification sent!', response);
          })
          .catch(function(error) {
            console.error('❌ Error sending notification:', error);
          });
      };
      document.head.appendChild(script);
    }

    // ============================================================
    //  📥  SAVE ORDER TO SUPABASE
    // ============================================================
    function saveOrderToSupabase(orderData, callback) {
      var url = SUPABASE_URL + '/rest/v1/' + ORDERS_TABLE;
      var xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Prefer', 'return=representation');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || xhr.status === 201) {
            try {
              var data = JSON.parse(xhr.responseText);
              callback({ success: true, data: data });
            } catch (e) {
              if (xhr.responseText === '[]' || xhr.responseText === '') {
                callback({ success: true, data: [orderData] });
              } else {
                callback({ success: false, error: 'Invalid response format' });
              }
            }
          } else {
            var errorMsg = 'Status ' + xhr.status + ': ' + xhr.responseText;
            console.error('❌ Supabase error:', errorMsg);
            callback({ success: false, error: errorMsg });
          }
        }
      };

      xhr.onerror = function() {
        console.error('❌ Network error');
        callback({ success: false, error: 'Network error' });
      };

      xhr.send(JSON.stringify(orderData));
    }

    // ============================================================
    //  🛍️  CONFIRM BUY - PLACE ORDER
    // ============================================================
    function confirmBuy() {
      var index = document.getElementById('buyProductIndex').value;
      var laptop = allLaptops[index];
      if (!laptop) {
        showToast('❌ Product not found.', true);
        return;
      }

      var customerName = document.getElementById('customerName').value.trim();
      var customerEmail = document.getElementById('customerEmail').value.trim();
      var customerPhone = document.getElementById('customerPhone').value.trim();
      var service = document.getElementById('buyService').value;

      if (!customerName || !customerEmail || !customerPhone) {
        showToast('⚠️ Please enter your contact details.', true);
        return;
      }

      if (customerEmail.indexOf('@') === -1 || customerEmail.indexOf('.') === -1) {
        showToast('⚠️ Please enter a valid email address.', true);
        return;
      }

      if (!service) {
        showToast('⚠️ Please select a service method.', true);
        return;
      }

      var confirmBtn = document.getElementById('confirmBuyBtn');
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="loading-spinner"></span> Placing order...';

      var orderPayload = {
        customer_name: customerName,
        customer_email: customerEmail,
        customer_phone: customerPhone,
        product_name: laptop.name,
        price: laptop.price,
        color: 'N/A',
        size: 'N/A',
        service_method: service,
        status: 'pending',
        ordered_at: new Date().toISOString()
      };

      saveOrderToSupabase(orderPayload, function(result) {
        console.log('📥 Save result:', result);

        if (!result.success) {
          showToast('❌ Failed to save order. Please try again.', true);
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
          return;
        }

        var savedOrder = result.data && result.data.length > 0 ? result.data[0] : orderPayload;
        console.log('✅ Order saved!', savedOrder);

        sendOrderNotification(savedOrder);
        showToast('✅ Order placed for "' + laptop.name + '"! Check your email.');

        var modal = bootstrap.Modal.getInstance(document.getElementById('buyNowModal'));
        if (modal) modal.hide();

        document.getElementById('buyNowForm').reset();

        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Place Order';
      });
    }

    // ============================================================
    //  🛠️  PREPARE BUY NOW MODAL
    // ============================================================
    function prepareBuyNow(index) {
      var laptop = allLaptops[index];
      if (!laptop) return;

      document.getElementById('productNameDisplay').textContent = laptop.name;
      document.getElementById('productPriceDisplay').textContent = laptop.price;
      document.getElementById('buyProductIndex').value = index;
      document.getElementById('buyCondition').value = laptop.condition || 'Pre-owned, Refurbished';

      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('buyService').value = '';
    }

    // ============================================================
    //  🗑️  DELETE LAPTOP (seller-added only)
    // ============================================================
    function deleteLaptop(index) {
      var realIndex = index - existingLaptops.length;
      if (realIndex < 0 || realIndex >= sellerLaptops.length) return;

      if (confirm('Are you sure you want to delete this item?')) {
        sellerLaptops.splice(realIndex, 1);
        localStorage.setItem('laptops', JSON.stringify(sellerLaptops));
        allLaptops = existingLaptops.concat(sellerLaptops);
        renderProducts();
        showToast('🗑️ Laptop deleted successfully');
      }
    }

    // ============================================================
    //  🎨  RENDER PRODUCTS
    // ============================================================
    function renderProducts() {
      var shop = document.getElementById('shop');
      shop.innerHTML = '';

      for (var i = 0; i < allLaptops.length; i++) {
        var laptop = allLaptops[i];
        var isSeller = i >= existingLaptops.length;

        var card = document.createElement('div');
        card.className = 'col-md-4 col-lg-3 mb-4 laptop-card';
        card.innerHTML = `
          <div class="card shadow-sm h-100" style="position: relative;">
            ${isSeller ? `<button class="delete-btn" onclick="deleteLaptop(${i})"><i class="fas fa-times"></i></button>` : ''}
            <img src="${laptop.image || 'https://via.placeholder.com/300x220?text=No+Image'}" class="card-img-top" alt="${laptop.name}" 
                 onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${laptop.name}</h5>
              <p class="card-text fw-bold text-danger">P${laptop.price.toFixed(2)}</p>
              <p class="card-text small text-muted"><span class="badge-condition">${laptop.condition || 'Pre-owned, Refurbished'}</span></p>
              ${isSeller ? '<span class="seller-badge">➕ Seller Added</span>' : ''}
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary btn-sm" onclick="addToCart(${i})">
                  <i class="fas fa-cart-plus me-1"></i>Add to Cart
                </button>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#buyNowModal" 
                        onclick="prepareBuyNow(${i})">
                  <i class="fas fa-bolt me-1"></i>Buy Now
                </button>
              </div>
            </div>
          </div>
        `;
        shop.appendChild(card);
      }

      document.getElementById('productCount').textContent = allLaptops.length;
    }

    // ============================================================
    //  🚀  INIT
    // ============================================================
    function init() {
      renderProducts();
      updateCartButton();

      console.log('✅ Shop page loaded with ' + allLaptops.length + ' laptops');
    }

    // Expose functions globally
    window.addToCart = addToCart;
    window.prepareBuyNow = prepareBuyNow;
    window.confirmBuy = confirmBuy;
    window.deleteLaptop = deleteLaptop;
    window.showToast = showToast;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>

</html>

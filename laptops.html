<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Laptops</title>

<style>
body { font-family: Arial; margin:0; background:white; color:#b30000; text-align:center; }
header { background:#b30000; color:white; padding:20px; }
nav ul { list-style:none; display:flex; justify-content:center; gap:15px; padding:0; }
nav a { color:white; text-decoration:none; font-weight:bold; }

.laptop-card {
  border:1px solid #eee;
  margin:15px;
  padding:15px;
  width:250px;
  display:inline-block;
  border-radius:10px;
  background:white;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  position: relative;
}

.laptop-card img { width:200px; height:auto; }

button {
  margin:5px;
  padding:10px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:white;
  color:#b30000;
  border:2px solid #b30000;
}

.note { font-weight:bold; margin:15px 0; }

.delete-btn {
  position: absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:4px;
  cursor:pointer;
}

.delete-btn:hover {
  background:white;
  color:red;
  border:1px solid red;
}
</style>
</head>

<body>

<header>
<h1>View Laptops</h1>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="form.html">Form</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<main>
<p class="note">All laptops are pre-owned, refurbished, and fully tested ✔️</p>

<!-- Container for all laptops -->
<div id="laptop-listings"></div>

<!-- Go Back Button -->
<button onclick="goBack()">← Go Back</button>
</main>

<script>
// === HARDCODED EXISTING LAPTOPS ===
const existingLaptops = [
  {name:"Dell Inspiron 15", price:"4200", condition:"Pre-owned, Refurbished", image:"dell.jpg"},
  {name:"HP Pavilion 14", price:"6000", condition:"Pre-owned, Refurbished", image:"hp.jpg"},
  {name:"Lenovo ThinkPad E14", price:"5500", condition:"Pre-owned, Refurbished", image:"lenovo.jpg"},
  {name:"MacBook Air", price:"8000", condition:"Pre-owned, Refurbished", image:"macbook.jpg"},
  {name:"MacBook Air Alt", price:"7000", condition:"Pre-owned, Refurbished", image:"book.jpg"},
  {name:"Acer", price:"3500", condition:"Pre-owned, Refurbished", image:"cer.jpg"},
  {name:"HP Intel Core i3", price:"4500", condition:"Pre-owned, Refurbished", image:"core.jpg"},
  {name:"Dell Laptop", price:"4000", condition:"Pre-owned, Refurbished", image:"lap.jpg"},
  {name:"MacBook Air Pro", price:"7500", condition:"Pre-owned, Refurbished", image:"mac.jpg"},
  {name:"Lenovo Laptop", price:"5500", condition:"Pre-owned, Refurbished", image:"novo.jpg"}
];

// === GET SELLER-ADDED LAPTOPS ===
let sellerLaptops = JSON.parse(localStorage.getItem("laptops")) || [];

// === MERGE BOTH ARRAYS FOR DISPLAY ===
const allLaptops = existingLaptops.concat(sellerLaptops);

// === RENDER LAPTOPS ===
const container = document.getElementById("laptop-listings");

function renderLaptops() {
  container.innerHTML = ""; // Clear first

  // Render existing laptops (no delete)
  existingLaptops.forEach(item => {
    const div = document.createElement("div");
    div.className = "laptop-card";
    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p>Price: P${item.price}<br><strong>Condition:</strong> ${item.condition}</p>
      <button onclick="buyNow(this)">Buy Now</button>
      <button onclick="addToCart(this)">Add to Cart</button>
    `;
    container.appendChild(div);
  });

  // Render seller-added laptops (with delete)
  sellerLaptops.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "laptop-card";
    div.setAttribute("data-index", index);

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p>Price: P${item.price}<br><strong>Condition:</strong> ${item.condition}</p>
      <button onclick="buyNow(this)">Buy Now</button>
      <button onclick="addToCart(this)">Add to Cart</button>
      <button class="delete-btn" onclick="deleteLaptop(${index})">Delete</button>
    `;
    container.appendChild(div);
  });
}

// === DELETE FUNCTION ===
function deleteLaptop(index) {
  if(confirm("Are you sure you want to delete this item?")) {
    sellerLaptops.splice(index,1);
    localStorage.setItem("laptops", JSON.stringify(sellerLaptops));
    renderLaptops();
  }
}

// === CART FUNCTION ===
function addToCart(btn){
  let card = btn.closest(".laptop-card");
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let laptop = {
    name: card.querySelector("h3").innerText,
    price: card.querySelector("p").innerText.split("Price: P")[1].split("<")[0],
    image: card.querySelector("img").src
  };
  cart.push(laptop);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(laptop.name + " added to cart");
}

// === BUY NOW FUNCTION ===
function buyNow(btn){
  let card = btn.closest(".laptop-card");
  let laptop = {
    name: card.querySelector("h3").innerText,
    price: card.querySelector("p").innerText.split("Price: P")[1].split("<")[0],
    image: card.querySelector("img").src
  };
  localStorage.setItem("selectedLaptop", JSON.stringify(laptop));
  window.location.href = "form.html";
}

// === GO BACK ===
function goBack() { window.history.back(); }

// Initial render
renderLaptops();
</script>

</body>
</html>

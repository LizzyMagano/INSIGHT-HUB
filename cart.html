<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>

<style>
body { 
  font-family: Arial; 
  margin:0; 
  text-align:center;
  color:white;
}

/* Background */
body::before {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('laptop.jpg'); /* change image if needed */
  background-size: cover;
  background-position: center;
  z-index:-1;
}

header { 
  background:#b30000; 
  color:white; 
  padding:20px; 
}

#cart {
  padding: 20px;
}

/* Cart Cards */
.cart-item { 
  border:1px solid rgba(255,255,255,0.2); 
  margin:15px; 
  padding:15px; 
  border-radius:10px; 
  display:inline-block; 
  width:250px; 
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.cart-item img { 
  width:200px; 
  height:auto; 
  border-radius:8px;
}

/* Buttons */
button { 
  margin:10px; 
  padding:10px 15px; 
  background:#b30000; 
  color:white; 
  border:none; 
  border-radius:6px; 
  cursor:pointer;
  font-weight: bold;
}

button:hover { 
  background:white; 
  color:#b30000; 
  border:2px solid #b30000; 
}

/* Bottom buttons layout */
.actions {
  margin: 20px;
}
</style>
</head>

<body>

<header>
<h1>Your Cart</h1>
</header>

<div id="cart"></div>

<div class="actions">
  <button onclick="goBack()">← View More</button>
  <button onclick="checkout()">Checkout 🛒</button>
</div>

<script>
// Load cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cart");

// Display cart
function renderCart() {
    cartDiv.innerHTML = '';

    if(cart.length === 0){
        cartDiv.innerHTML = "<p>Cart is empty</p>";
        return;
    }

    cart.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <h3>${item.name}</h3>
            <p>
                Price: P${item.price}<br>
                Deposit: P${item.deposit}<br>
                Installments: P${item.installments}<br>
                Storage: ${item.storage}<br>
                Condition: Pre-owned, Refurbished
            </p>
            <button onclick="removeItem(${index})">Remove</button>
        `;

        cartDiv.appendChild(div);
    });
}

// Remove item
function removeItem(index){
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// FIXED: correct page link
function goBack() { 
    window.location.href = "laptops.html"; 
}

// Checkout
function checkout() {
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }
    window.location.href = "form.html";
}

// Run on load
renderCart();
</script>

</body>
</html>
